<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#050814;
color:white;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

h2{
margin-bottom:20px;
}

button{

padding:10px 16px;

border:none;
border-radius:10px;

background:#ff6b81;
color:white;

cursor:pointer;

}

.random-btn{
background:#ffd166;
color:black;
margin-bottom:20px;
}

.card{

background:rgba(20,25,40,0.85);
padding:16px;
border-radius:14px;
margin-bottom:12px;

}

.card a{
color:#8ecaff;
text-decoration:none;
}

.card a:hover{
text-decoration:underline;
}

.highlight{

box-shadow:0 0 30px #ffd166;

}

</style>

</head>

<body>

<div class="container">

<h2>Wishlist Admin</h2>

<button class="random-btn" onclick="randomGift()">🎲 Random Gift</button>

<div id="adminList"></div>

</div>

<script>

const { createClient } = supabase

const client = createClient(
"https://dkmlutpxnikwtzrntmts.supabase.co",
"sb_publishable_bUoFVF3pk_IKgu0R0oweaw_NSdAe6xV"
)

/* ---------- LOAD DATA ---------- */

async function loadAdmin(){

const {data,error}=await client
.from("wishlist")
.select("*")
.order("created_at",{ascending:false})

if(error){
console.error(error)
return
}

const list=document.getElementById("adminList")
list.innerHTML=""

data.forEach(g=>{

list.innerHTML+=`

<div class="card" data-id="${g.id}">

<b>💝 ${g.gift_name}</b><br>

Priority: ${g.priority}<br>

${g.link?`<a href="${g.link}" target="_blank">🔗 Open product</a><br>`:""}

<br>

<button onclick="deleteGift('${g.id}')">Delete</button>

</div>

`

})

}

loadAdmin()

/* ---------- DELETE ---------- */

async function deleteGift(id){

const confirmDelete = confirm("Xoá món quà này?")

if(!confirmDelete) return

await client
.from("wishlist")
.delete()
.eq("id", id)

loadAdmin()

}

/* ---------- RANDOM GIFT ---------- */

function randomGift(){

const cards=document.querySelectorAll(".card")

if(cards.length===0) return

cards.forEach(c=>c.classList.remove("highlight"))

const r=Math.floor(Math.random()*cards.length)

cards[r].classList.add("highlight")

cards[r].scrollIntoView({
behavior:"smooth",
block:"center"
})

}

</script>

</body>
</html>
